<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maturitní ples oktáva 2028</title>
  <style>
    body {
      margin: 0;
      padding: 24px 16px;
      font-family: sans-serif;
      text-align: center;
      background: #fff;
      color: #111;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 32px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      max-width: 600px;
      margin: 0 auto 32px auto;
    }

    .ticket {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .ticket img {
      width: 100%;
      max-width: 200px;
      height: auto;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    .ticket span {
      font-size: 1rem;
      font-weight: bold;
    }

    p {
      font-size: 0.95rem;
      color: #444;
      max-width: 400px;
      margin: 0 auto;
      line-height: 1.5;
    }

    @media (min-width: 700px) {
      .grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
<body>

  <h1>Maturitní ples oktáva 2028</h1>

  <div class="grid">
    <div class="ticket">
      <img src="qr.jpg" alt="QR kód pro 1 lístek">
      <span>1 lístek</span>
    </div>
    <div class="ticket">
      <img src="qr.jpg" alt="QR kód pro 2 lístky">
      <span>2 lístky</span>
    </div>
    <div class="ticket">
      <img src="qr.jpg" alt="QR kód pro 3 lístky">
      <span>3 lístky</span>
    </div>
    <div class="ticket">
      <img src="qr.jpg" alt="QR kód pro 4 lístky">
      <span>4 lístky</span>
    </div>
  </div>

  <p>do poznámky prosím přidejte svůj email, lístky vám budou zaslány</p>

</body>
</html>
